<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="author" content="CodeHim" />
    <title>Animated Login Form - Grocery List App</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/demo.css') }}"
    />
  </head>
  <body>
    <div class="ring" id="ring">
      <i style="--clr: #00ff0a"></i>
      <i style="--clr: #ff0057"></i>
      <i style="--clr: #fffd44"></i>

      <!-- LOGIN BOX -->
      <div class="login" id="loginForm">
        <h2
          style="
            color: #ff0057;
            font-family:
              &quot;Gill Sans&quot;, &quot;Gill Sans MT&quot;, Calibri,
              &quot;Trebuchet MS&quot;, sans-serif;
          "
        >
          Login
        </h2>

        <form id="loginFormSubmit">
          <div class="inputBx">
            <input
              id="username"
              type="text"
              name="username"
              placeholder="Username"
              required
            />
          </div>
          <div class="inputBx">
            <input
              id="password"
              type="password"
              name="password"
              placeholder="Password"
              required
            />
          </div>
          <div class="inputBx">
            <input type="submit" value="Sign in" />
          </div>
        </form>

        <div class="links">
          <a href="forgot.html" style="color: blue">Forget Password</a>
          <a href="signup.html" style="color: blue">Signup</a>
        </div>
        <p>Go paperless save trees with digital grocery lists!</p>
      </div>

      <!-- SUCCESS BOX -->
      <div class="login" id="successMsg" style="display: none">
        <h2 style="color: #32cd32">Welcome back!</h2>
        <p id="welcomeUser"></p>
        <div class="inputBx">
          <input
            type="button"
            value="Go to Dashboard"
            onclick="goToHome()"
            style="
              background: linear-gradient(45deg, #32cd32, #228b22);
              border: none;
            "
          />
        </div>
      </div>

      <!-- ERROR POPUP -->
      <div
        id="errorMsg"
        style="
          position: absolute;
          top: 10px;
          left: 50%;
          transform: translateX(-50%);
          background: rgba(255, 0, 0, 0.9);
          color: #fff;
          padding: 10px 20px;
          border-radius: 20px;
          display: none;
          z-index: 1000;
        "
      ></div>
    </div>

    <script>
      function showError(msg) {
        const errorDiv = document.getElementById("errorMsg");
        errorDiv.textContent = msg;
        errorDiv.style.display = "block";
        setTimeout(() => (errorDiv.style.display = "none"), 3000);
      }

      function goToHome() {
        window.location.href = "home.html";
      }

      document
        .getElementById("loginFormSubmit")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const username = document.getElementById("username").value.trim();
          const password = document.getElementById("password").value;

          if (!username || !password) {
            showError("Please enter username and password!");
            return;
          }

          const res = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });

          const data = await res
            .json()
            .catch(() => ({ ok: false, message: "Login failed" }));

          if (!data.ok) {
            showError(data.message || "Invalid username or password!");
            return;
          }

          document.getElementById("loginForm").style.display = "none";
          document.getElementById("successMsg").style.display = "flex";
          document.getElementById("welcomeUser").textContent =
            `Hello, ${data.username}!`;

          setTimeout(() => (window.location.href = "home.html"), 900);
        });
    </script>
  </body>
</html>
